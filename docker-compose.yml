version: '3.8'

services:
  prophet-server:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://prophet:password@postgres:5432/prophet
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=prophet-central-secret-key
      - NODE_ENV=production
    depends_on:
      - postgres
      - redis
    restart: always

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: prophet
      POSTGRES_PASSWORD: password
      POSTGRES_DB: prophet
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  redis_data:
