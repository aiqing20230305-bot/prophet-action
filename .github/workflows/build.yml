name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          tags: prophet-action:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Prophet micro-tasks
        run: |
          docker run --rm prophet-action:test node -v
          docker run --rm prophet-action:test npm list --depth=0

      - name: Run quick health check
        run: |
          docker run --rm prophet-action:test node -e "console.log('Prophet loaded:', require('./prophet-micro-tasks.cjs') ? 'OK' : 'FAIL')"
